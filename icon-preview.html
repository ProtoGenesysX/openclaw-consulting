<!DOCTYPE html>
<html>
<head>
<style>
body { background: #050810; display: flex; gap: 60px; justify-content: center; align-items: center; min-height: 100vh; font-family: Inter, sans-serif; color: white; }
.option { text-align: center; }
.option p { margin-top: 16px; font-size: 14px; opacity: 0.6; }
.box { width: 80px; height: 80px; background: #ff4d4d; display: flex; align-items: center; justify-content: center; border-radius: 12px; box-shadow: 0 0 40px rgba(255,77,77,0.5); }
.box svg { width: 48px; height: 48px; }
.small { display: flex; gap: 20px; align-items: center; margin-top: 30px; }
.small .box { width: 40px; height: 40px; border-radius: 8px; box-shadow: 0 0 25px rgba(255,77,77,0.4); }
.small .box svg { width: 24px; height: 24px; }
.small span { font-size: 24px; font-weight: 900; letter-spacing: -0.05em; }
</style>
</head>
<body>

<div class="option">
<div class="box">
<!-- Option A: Claw style (minimal pincer/claw) -->
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
<path d="M7 3C5 5 4 8 5 11c1 3 3 5 7 5s6-2 7-5c1-3 0-6-2-8"/>
<path d="M7 3C7 5 8 7 10 8"/>
<path d="M17 3c0 2-1 4-3 5"/>
<path d="M9 16l-1 2.5c-.5 1 0 2 1 2.5"/>
<path d="M15 16l1 2.5c.5 1 0 2-1 2.5"/>
<path d="M11 16v3"/>
<path d="M13 16v3"/>
</svg>
</div>
<p>A — Claw / Pincer</p>
<div class="small">
<div class="box">
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
<path d="M7 3C5 5 4 8 5 11c1 3 3 5 7 5s6-2 7-5c1-3 0-6-2-8"/>
<path d="M7 3C7 5 8 7 10 8"/>
<path d="M17 3c0 2-1 4-3 5"/>
<path d="M9 16l-1 2.5c-.5 1 0 2 1 2.5"/>
<path d="M15 16l1 2.5c.5 1 0 2-1 2.5"/>
<path d="M11 16v3"/>
<path d="M13 16v3"/>
</svg>
</div>
<span>openclaw.at0mic</span>
</div>
</div>

<div class="option">
<div class="box">
<!-- Option B: Full lobster silhouette outline -->
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<!-- Body -->
<ellipse cx="12" cy="13" rx="3.5" ry="5"/>
<!-- Head -->
<circle cx="12" cy="7" r="2.5"/>
<!-- Eyes -->
<circle cx="10.5" cy="6.5" r="0.4" fill="white"/>
<circle cx="13.5" cy="6.5" r="0.4" fill="white"/>
<!-- Antennae -->
<path d="M10 5L7 2"/>
<path d="M14 5l3-3"/>
<path d="M7 2l-1.5.5"/>
<path d="M17 2l1.5.5"/>
<!-- Claws -->
<path d="M8.5 9C6 8 4 9 4 11c0 1.5 1.5 2 2.5 1.5"/>
<path d="M15.5 9c2.5-1 4.5 0 4.5 2 0 1.5-1.5 2-2.5 1.5"/>
<!-- Tail fins -->
<path d="M10 18l-1.5 2"/>
<path d="M12 18v2.5"/>
<path d="M14 18l1.5 2"/>
</svg>
</div>
<p>B — Full Lobster</p>
<div class="small">
<div class="box">
<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<ellipse cx="12" cy="13" rx="3.5" ry="5"/>
<circle cx="12" cy="7" r="2.5"/>
<circle cx="10.5" cy="6.5" r="0.4" fill="white"/>
<circle cx="13.5" cy="6.5" r="0.4" fill="white"/>
<path d="M10 5L7 2"/>
<path d="M14 5l3-3"/>
<path d="M7 2l-1.5.5"/>
<path d="M17 2l1.5.5"/>
<path d="M8.5 9C6 8 4 9 4 11c0 1.5 1.5 2 2.5 1.5"/>
<path d="M15.5 9c2.5-1 4.5 0 4.5 2 0 1.5-1.5 2-2.5 1.5"/>
<path d="M10 18l-1.5 2"/>
<path d="M12 18v2.5"/>
<path d="M14 18l1.5 2"/>
</svg>
</div>
<span>openclaw.at0mic</span>
</div>
</div>

</body>
</html>
