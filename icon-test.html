<!DOCTYPE html>
<html>
<head>
<style>
body { background: #050810; display: flex; gap: 40px; justify-content: center; align-items: center; min-height: 100vh; font-family: Inter, sans-serif; color: white; flex-direction: column; }
.row { display: flex; gap: 30px; align-items: center; }
.box { background: #ff4d4d; display: flex; align-items: center; justify-content: center; border-radius: 8px; box-shadow: 0 0 25px rgba(255,77,77,0.4); padding: 6px; }
.box img, .box object { width: 100%; height: 100%; object-fit: contain; }
.large .box { width: 120px; height: 120px; border-radius: 16px; }
.nav .box { width: 40px; height: 40px; }
.nav { display: flex; gap: 12px; align-items: center; }
.nav span { font-size: 22px; font-weight: 900; letter-spacing: -0.05em; }
p { opacity: 0.5; font-size: 13px; margin: 8px 0 0; }
</style>
</head>
<body>
<div class="large row">
<div>
<div class="box"><img src="img/lobster-icon-white.svg" alt="SVG"></div>
<p>SVG (traced)</p>
</div>
</div>
<div class="nav">
<div class="box"><img src="img/lobster-icon-white.svg" alt="SVG"></div>
<span>openclaw.at0mic</span>
</div>
</body>
</html>
